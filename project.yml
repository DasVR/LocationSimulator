name: LocationSimulator
targets:
  LocationSimulator:
    type: application
    platform: iOS
    deploymentTarget: "17.4"
    sources:
      - path: LocationSimulator/App
      - path: LocationSimulator/Views
      - path: LocationSimulator/ViewModels
      - path: LocationSimulator/Models
      - path: LocationSimulator/Services
      - path: LocationSimulator/idevice
    resources:
      - path: LocationSimulator/Resources/Config.plist
      - path: LocationSimulator/Info.plist
    entitlements:
      path: LocationSimulator/LocationSimulator.entitlements
    settings:
      base:
        SWIFT_VERSION: "5.9"
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: MapKit.framework
      - sdk: CoreLocation.framework
      - sdk: AVFoundation.framework
      - sdk: NetworkExtension.framework
      - sdk: UniformTypeIdentifiers.framework
      - framework: LocationSimulator/idevice/IDevice.xcframework

  LocationSimulatorTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.4"
    sources:
      - path: LocationSimulatorTests
    dependencies:
      - target: LocationSimulator
