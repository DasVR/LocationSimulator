name: Generate Xcode Project

on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate and Commit .xcodeproj
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install xcodegen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: Download libidevice xcframework
        run: bash LocationSimulator/scripts/download-libidevice.sh

      - name: Generate Xcode project
        run: xcodegen generate --quiet

      - name: Verify VPN extension is present
        run: |
          test -d LocationSimulator.xcodeproj || (echo "Missing .xcodeproj"; exit 1)
          grep -q "LocationSimulatorVPN" LocationSimulator.xcodeproj/project.pbxproj || \
            (echo "VPN extension missing"; exit 1)
          echo "LocationSimulatorVPN target confirmed in project.pbxproj"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit .xcodeproj
        run: |
          git add LocationSimulator.xcodeproj/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: commit generated .xcodeproj with VPN extension [skip ci]"
          git push
