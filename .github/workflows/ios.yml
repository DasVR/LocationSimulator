name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-xcodegen-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-xcodegen-

      - name: Install xcodegen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: Download libidevice xcframework
        run: |
          bash LocationSimulator/scripts/download-libidevice.sh

      - name: Generate Xcode project
        run: |
          test -f project.yml || (echo "Missing project.yml"; exit 1)
          xcodegen generate
          echo "--- Generated project contents ---"
          ls -la LocationSimulator.xcodeproj/

      - name: Build (Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project LocationSimulator.xcodeproj \
            -scheme LocationSimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build \
            | tee build.log
        timeout-minutes: 10

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-logs
          path: |
            build.log
            *.log
