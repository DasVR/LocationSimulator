name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-xcodegen-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-xcodegen-

      - name: Install xcodegen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: Download libidevice xcframework
        run: |
          bash LocationSimulator/scripts/download-libidevice.sh

      - name: Generate Xcode project
        id: generate
        run: |
          # Use the CI-safe project file (no VPN extension — xcodegen hangs on it)
          cp project-ci.yml project.yml
          test -f project.yml || (echo "Missing project.yml"; exit 1)

          xcodegen generate --quiet
          echo "status=success" >> "$GITHUB_OUTPUT"

          echo "--- Generated project contents ---"
          ls -la LocationSimulator.xcodeproj/

      - name: Build (Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project LocationSimulator.xcodeproj \
            -scheme LocationSimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build \
            | tee build.log
        timeout-minutes: 10

      - name: Build (Device) and Package IPA
        run: |
          set -o pipefail

          # Build for device (unsigned — SideStore will re-sign)
          xcodebuild \
            -project LocationSimulator.xcodeproj \
            -scheme LocationSimulator \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build \
            | tee device-build.log

          # Find the built .app bundle
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData \
            -name "LocationSimulator.app" \
            -path "*/Build/Products/Release-iphoneos/*" 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Looking in Debug-iphoneos..."
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData \
              -name "LocationSimulator.app" \
              -path "*/Build/Products/Debug-iphoneos/*" 2>/dev/null | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find built .app bundle"
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          # Package as IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r LocationSimulator.ipa Payload
          rm -rf Payload

          ls -lh LocationSimulator.ipa

      - name: Upload IPA
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: LocationSimulator-unsigned
          path: LocationSimulator.ipa

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-logs
          path: |
            build.log
            device-build.log
            *.log
