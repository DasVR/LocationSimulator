name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build, Test, and Release
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Verify Xcode project exists
        run: |
          test -d LocationSimulator.xcodeproj || (echo "Missing .xcodeproj"; exit 1)
          grep -q "LocationSimulatorVPN" LocationSimulator.xcodeproj/project.pbxproj || \
            (echo "VPN extension missing from project"; exit 1)
          echo "LocationSimulator.xcodeproj verified (includes VPN extension)"

      - name: Download libidevice xcframework
        run: bash LocationSimulator/scripts/download-libidevice.sh

      - name: Build (Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project LocationSimulator.xcodeproj \
            -scheme LocationSimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build \
            | tee build.log
        timeout-minutes: 10

      - name: Build (Device) and Package IPA
        id: build_ipa
        run: |
          set -o pipefail

          # Build for device (unsigned — SideStore will re-sign)
          xcodebuild \
            -project LocationSimulator.xcodeproj \
            -scheme LocationSimulator \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build \
            | tee device-build.log

          # Find the built .app bundle
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData \
            -name "LocationSimulator.app" \
            -path "*/Build/Products/Release-iphoneos/*" 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Looking in Debug-iphoneos..."
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData \
              -name "LocationSimulator.app" \
              -path "*/Build/Products/Debug-iphoneos/*" 2>/dev/null | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find built .app bundle"
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          # Find the built VPN extension
          EXT_PATH=$(find ~/Library/Developer/Xcode/DerivedData \
            -name "LocationSimulatorVPN.appex" \
            -path "*/Build/Products/Release-iphoneos/*" 2>/dev/null | head -1)

          if [ -z "$EXT_PATH" ]; then
            echo "Looking for VPN extension in Debug-iphoneos..."
            EXT_PATH=$(find ~/Library/Developer/Xcode/DerivedData \
              -name "LocationSimulatorVPN.appex" \
              -path "*/Build/Products/Debug-iphoneos/*" 2>/dev/null | head -1)
          fi

          if [ -n "$EXT_PATH" ]; then
            echo "Found VPN extension at: $EXT_PATH"
            mkdir -p "$APP_PATH/PlugIns"
            cp -R "$EXT_PATH" "$APP_PATH/PlugIns/"
            echo "VPN extension copied into app bundle"
          else
            echo "WARNING: VPN extension not found"
          fi

          # Package as IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r LocationSimulator.ipa Payload
          rm -rf Payload

          ls -lh LocationSimulator.ipa
          echo "ipa_path=LocationSimulator.ipa" >> "$GITHUB_OUTPUT"
          echo "ipa_size=$(stat -f%z LocationSimulator.ipa 2>/dev/null || stat -c%s LocationSimulator.ipa)" >> "$GITHUB_OUTPUT"

      - name: Upload IPA
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: LocationSimulator-unsigned
          path: LocationSimulator.ipa

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-logs
          path: |
            build.log
            device-build.log
            *.log

  release:
    name: Create GitHub Release
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: LocationSimulator-unsigned
          path: ./

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (${{ steps.vars.outputs.sha_short }})"
          body: |
            Automated build of LocationSimulator with VPN extension.

            - **Version**: ${{ steps.vars.outputs.sha_short }}
            - **Date**: ${{ github.event.head_commit.timestamp }}
            - **Commit**: ${{ github.sha }}

            This IPA is **unsigned**. Install it via [SideStore](https://sidestore.io) or [AltStore](https://altstore.io).
            See [DISTRIBUTION.md](https://github.com/${{ github.repository }}/blob/main/LocationSimulator/DISTRIBUTION.md) for installation instructions.
          files: LocationSimulator.ipa
          make_latest: true
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
